name: Daily travel agent


on:
  schedule:
    - cron: '45 6 * * 1-5'    # 07:45 CET (UTC+1) on weekdays
  workflow_dispatch:            # allow manual trigger for testing

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run orchestrator
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          RAPIDAPI_KIWI_HOST: kiwi-com-flights-api.p.rapidapi.com
          RAPIDAPI_KIWI_PRICE_MAP_PATH: /api/v1/flights/price-map
          RAPIDAPI_SKY_HOTELS_PATH: ${{ secrets.RAPIDAPI_SKY_HOTELS_PATH }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          GMAIL_CREDENTIALS: ${{ secrets.GMAIL_CREDENTIALS }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python agents/orchestrator.py
